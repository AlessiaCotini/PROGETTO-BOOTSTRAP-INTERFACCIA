<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
  <body class="bg-dark">
    <header class="bg-dark">
    <nav class="navbar navbar-expand-lg bg-dark-tertiary">
    <div class="container-fluid bg-dark p-2">
    <a class="navbar-brand" href="#"><img src="./Netflix-assets/assets/netflix_logo.png" width="100px" alt="logo"></a></div>
    <div class="pe-5">
    <a class="nav-link active text-white" aria-current="page" href="./interfaccia.html">Home</a>
   </div></nav>
    </header>
    <main class="bg-dark text-white">
    <div class="container-fluid">
        <div class="row">
            <div class="col-1 col-md-3"></div>
            <div class="col-12 col-md-6">
                <h1>Edit Profile</h1>
                <hr>
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-4 mb-2 position-relative"><img src="./Netflix-assets/assets/avatar.png" alt="editimg" class="img-fluid w-100" style="min-width: 50px; max-width: 175px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"class="bi bi-pencil-fill position-absolute top-0 start-0 m-3 p-1 border rounded-circle bg-black" viewBox="0 0 16 16">
                        <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z" />
                        </svg></div>
                        <div class="col-12 col-md-8 col-lg-6">
                            <input type="text" name="name" placeholder="Service Student"  style="min-width: 100px;" class="form-control bg-secondary rounded-0 border-opacity-10 text-white w-100">
                            <h6 class="text-secondary m-0 my-1">Lenguage:</h6>
                            <div class="dropdown w-100">
                            <button class="btn btn-secondary dropdown-toggle text-white bg-black rounded-0"  style="min-width: 50px;" type="button" data-bs-toggle="dropdown" aria-expanded="false">English</button>
                            <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Espanol</a></li>
                            <li><a class="dropdown-item" href="#">Italiano</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>
                            </div>
                            <hr>
                            <h6 class="text-secondary m-0">Maturity Settings:</h6>
                            <a class="dropdown-item" href="#"><p class="bg-secondary opacity-50 border border-1 rounded-0 text-light"  style="min-width: 100px;">ALL MATURITY RATING</p></a>
                            <p class="text-white">Show titles of all maturity ratings for this profile.</p>
                            <a class="dropdown-item" href="#"><p class="text-secondary border border-secondary rounded-0 d-flex justify-content-center "  style="width: 50px;">EDIT</p></a>
                            <hr>
                            <h6 class=""></h6>
                            <div class="form-check">
                            <input class="form-check-input bg-dark border-danger" type="checkbox" value="" id="checkDefault">
                            <label class="form-check-label" for="checkDefault">Autoplay next episode in a series on all devices</label>
                            </div>
                            <div class="form-check">
                            <input class="form-check-input bg-dark border-danger" type="checkbox" value="" id="checkChecked" checked>
                            <label class="form-check-label responsive-text" for="checkChecked">Autoplay previews while browsing on all devices</label>
                            </div>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="w-100 d-flex justify-content-between">
                     <button class="btn btn-dark text-secondary rounded-0 border-light border-opacity-75 bg-gradient p-1" type="button" style="font-size: 10px; width:25%;">SAVE</button>
                     <button class="btn btn-dark text-secondary rounded-0 border-light border-opacity-75 bg-gradient p-1" type="button" style="font-size: 10px; width:25%">CANCEL</button>
                     <button class="btn btn-dark text-secondary rounded-0 border-light border-opacity-75 bg-gradient p-1" type="button" style="font-size: 10px;  width:45%">DELETE PROFILE</button>
                </div>
            </div>
            <div class="col-1 col-md-3"></div>        
        </div>
    </div>
    </main>
    <footer class="bg-dark">
    </footer>
    <script src="https://unpkg.com/ionicons@4.1.2/dist/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
